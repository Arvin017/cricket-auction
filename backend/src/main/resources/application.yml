server:
  port: ${PORT:8080}

spring:
  datasource:
    # In production, hosts like Railway/Render inject these as env vars.
    # Locally, it falls back to the values after the colon.
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cricket_auction?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    # Kept as default (true) so lazy relations (e.g. Player.soldToTeam,
    # Team.players used in dashboard responses) can serialize without
    # LazyInitializationException. For a bigger production app you'd
    # switch this off and use explicit DTO projections instead.
    open-in-view: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  jwt:
    # ALWAYS set JWT_SECRET as a real env var in production — never rely on
    # this fallback once the app is publicly reachable.
    secret: ${JWT_SECRET:ChangeThisSecretKeyToSomethingLongAndRandomForProduction123456}
    expiration-ms: 86400000 # 24 hours

  # Comma-separated list of frontend origins allowed to call this API and
  # open a WebSocket connection. Set this to your deployed frontend's real
  # URL (e.g. https://strikezone-auctions.vercel.app) in production.
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

  auction:
    default-bid-timer-seconds: 30
    # Increment slabs are also hardcoded in bid_validation.lua — keep in sync
    # if you change these.
    slab-1-ceiling-rupees: 10000000   # below this (1 Cr): increment 10 Lakh
    slab-1-increment: 1000000
    slab-2-ceiling-rupees: 20000000   # 1 Cr - 2 Cr: increment 20 Lakh
    slab-2-increment: 2000000
    slab-3-increment: 2500000         # above 2 Cr: increment 25 Lakh

logging:
  level:
    com.auction: INFO

